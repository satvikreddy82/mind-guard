kind = "web"
previewPath = "/"
title = "MindGuard"
version = "1.0.0"
id = "artifacts/mindguard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24346

[services.development]
run = "pnpm --filter @workspace/mindguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mindguard", "run", "build" ]
publicDir = "artifacts/mindguard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24346"
BASE_PATH = "/"
